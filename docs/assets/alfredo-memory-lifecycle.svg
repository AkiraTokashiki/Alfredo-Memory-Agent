<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300" viewBox="0 0 1000 300" role="img" aria-labelledby="title desc">
  <title id="title">Alfredo MemoryAgent lifecycle</title>
  <desc id="desc">A local memory cycle: learn, retrieve, trust, pack, reinforce, then supersede or forget before learning again.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f8ff"/>
      <stop offset="1" stop-color="#eefaf6"/>
    </linearGradient>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4263a6"/>
    </marker>
    <style>
      .title { fill: #18243b; font: 700 22px system-ui, -apple-system, Segoe UI, sans-serif; }
      .label { fill: #18243b; font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; }
      .note { fill: #44536d; font: 400 12px system-ui, -apple-system, Segoe UI, sans-serif; }
      .node { fill: #ffffff; stroke: #87a2d9; stroke-width: 2; }
      .branch { fill: #fffaf0; stroke: #d59b45; stroke-width: 2; }
      .flow { fill: none; stroke: #4263a6; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="1" y="1" width="998" height="298" rx="18" fill="url(#panel)" stroke="#c9d6ec"/>
  <text x="32" y="38" class="title">Alfredo · MemoryAgent lifecycle</text>
  <text x="32" y="59" class="note">Persistent memory stays local, bounded, and explainable.</text>

  <rect x="32" y="96" width="132" height="68" rx="12" class="node"/>
  <text x="98" y="126" text-anchor="middle" class="label">Learn</text>
  <text x="98" y="147" text-anchor="middle" class="note">candidate memory</text>

  <rect x="190" y="96" width="132" height="68" rx="12" class="node"/>
  <text x="256" y="126" text-anchor="middle" class="label">Retrieve</text>
  <text x="256" y="147" text-anchor="middle" class="note">rank active records</text>

  <rect x="348" y="96" width="132" height="68" rx="12" class="node"/>
  <text x="414" y="126" text-anchor="middle" class="label">Trust</text>
  <text x="414" y="147" text-anchor="middle" class="note">evidence + reason</text>

  <rect x="506" y="96" width="132" height="68" rx="12" class="node"/>
  <text x="572" y="126" text-anchor="middle" class="label">Pack</text>
  <text x="572" y="147" text-anchor="middle" class="note">bounded context</text>

  <rect x="664" y="96" width="146" height="68" rx="12" class="node"/>
  <text x="737" y="126" text-anchor="middle" class="label">Reinforce</text>
  <text x="737" y="147" text-anchor="middle" class="note">useful memory lasts</text>

  <rect x="666" y="220" width="138" height="54" rx="12" class="branch"/>
  <text x="735" y="244" text-anchor="middle" class="label">Supersede</text>
  <text x="735" y="262" text-anchor="middle" class="note">newer truth wins</text>

  <rect x="830" y="220" width="138" height="54" rx="12" class="branch"/>
  <text x="899" y="244" text-anchor="middle" class="label">Forget</text>
  <text x="899" y="262" text-anchor="middle" class="note">archive on request</text>

  <path d="M164 130 H188" class="flow"/>
  <path d="M322 130 H346" class="flow"/>
  <path d="M480 130 H504" class="flow"/>
  <path d="M638 130 H662" class="flow"/>
  <path d="M737 164 V218" class="flow"/>
  <path d="M810 130 C850 130 850 185 850 218" class="flow"/>
  <path d="M666 247 C585 247 585 188 585 166" class="flow"/>
  <path d="M830 247 C760 290 238 290 98 166" class="flow"/>
</svg>
